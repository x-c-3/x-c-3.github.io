<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="{{site.title}} | {{page.title}}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://x-c-3.github.io/" />
  <meta property="og:image" content="https://x-c-3.github.io/assets/icons/thumbnail.png" />
  <meta property="og:description" content="{{page.description}}" />
  <meta name="theme-color" content="#151618">
  <title>{{site.title}} | {{page.title}}</title>
  {% if page.layout == "post" %}
  <link rel="stylesheet" href="/assets/css/post.css" />
  <link rel="stylesheet" href="/assets/css/syntax.css" />
  {% else %}
  <link rel="stylesheet" href="/assets/css/blog.css" />
  {%endif%}
  <link rel="stylesheet" href="/assets/css/common.css" />
  <script src="/assets/js/categories.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  {% if page.layout == "post" %}
  <script defer src="/assets/js/lbox.js"></script>
  <script defer src="/assets/js/post.js"></script>
  {% endif %}
</head>
